apiVersion: v1
kind: ServiceAccount
metadata:
  name: processing-stream
  namespace: app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: processing-stream-spark-driver
  namespace: app
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
      - persistentvolumeclaims
    verbs:
      - create
      - get
      - list
      - watch
      - delete
      - deletecollection
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: processing-stream-spark-driver
  namespace: app
subjects:
  - kind: ServiceAccount
    name: processing-stream
    namespace: app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: processing-stream-spark-driver
