apiVersion: sparkoperator.k8s.io/v1beta2
kind: ScheduledSparkApplication
metadata:
  name: processing-batch
  namespace: app
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulRunHistoryLimit: 3
  failedRunHistoryLimit: 3
  template:
    type: Python
    pythonVersion: "3"
    mode: cluster
    image: lucaswux/processing-batch:dev-20260617-224105
    mainApplicationFile: local:///opt/app/src/processing_batch/main.py
    sparkVersion: "3.5.8"
    restartPolicy:
      type: Never
    deps:
      packages:
        - org.apache.hadoop:hadoop-aws:3.3.4
    sparkConf:
      spark.jars.ivy: /tmp/.ivy2
      spark.sql.session.timeZone: UTC
    driver:
      cores: 1
      coreRequest: "500m"
      memory: 512m
      serviceAccount: processing-stream
      labels:
        app.kubernetes.io/name: processing-batch
      envFrom:
        - configMapRef:
            name: processing-batch-config
    executor:
      instances: 1
      cores: 1
      coreRequest: "500m"
      memory: 512m
      labels:
        app.kubernetes.io/name: processing-batch
      envFrom:
        - configMapRef:
            name: processing-batch-config
