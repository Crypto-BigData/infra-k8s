            name: processing-stream-config
            key: MINIO_HOST
      - name: MINIO_PORT
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: MINIO_PORT
      - name: MINIO_SECURE
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: MINIO_SECURE
      - name: BUCKET_NAME
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: BUCKET_NAME
      - name: RAW_OUTPUT_PATH
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: RAW_OUTPUT_PATH
      - name: CHECKPOINT_PATH
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: CHECKPOINT_PATH
      - name: CLICKHOUSE_URL
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: CLICKHOUSE_URL
      - name: CLICKHOUSE_CHECKPOINT_PATH
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: CLICKHOUSE_CHECKPOINT_PATH
      - name: OUTPUT_FORMAT
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: OUTPUT_FORMAT
      - name: TRIGGER_PROCESSING_TIME
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: TRIGGER_PROCESSING_TIME
      - name: PROGRESS_LOG_INTERVAL_SECONDS
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: PROGRESS_LOG_INTERVAL_SECONDS
  executor:
    instances: 1
    cores: 1
    memory: 512m
    labels:
      app.kubernetes.io/name: processing-stream
    env:
      - name: PYTHONPATH
        value: /opt/app/src
      - name: KAFKA_BOOTSTRAP_SERVERS
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: KAFKA_BOOTSTRAP_SERVERS
      - name: KAFKA_TOPICS
        valueFrom:
          configMapKeyRef:
            name: processing-stream-config
            key: KAFKA_TOPICS
      - name: KAFKA_STARTING_OFFSETS
        valueFrom:
