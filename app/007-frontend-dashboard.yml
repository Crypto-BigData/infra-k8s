apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-dashboard-env
  namespace: app
data:
  VITE_API_BASE_URL: /api
  VITE_USE_MOCK: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-dashboard-nginx
  namespace: app
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_pass http://backend-api.app.svc.cluster.local:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
      }

      location / {
        try_files $uri $uri/ /index.html;
      }

      location = /index.html {
        add_header Cache-Control "no-cache";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-dashboard
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-dashboard
  template:
    metadata:
      labels:
        app: frontend-dashboard
    spec:
      containers:
        - name: frontend-dashboard
          image: lucaswux/frontend-dashboard:dev-20260617-205442
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: frontend-dashboard-env
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 100M
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-dashboard-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-dashboard
  namespace: app
  labels:
    app: frontend-dashboard
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: frontend-dashboard
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-dashboard-ingress
  namespace: app
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dashboard.nukenake.xyz
      secretName: dashboard-nukenake-xyz-tls
  rules:
    - host: dashboard.nukenake.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-dashboard
                port:
                  number: 80
