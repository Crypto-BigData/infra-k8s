apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-api-ngrok-env
  namespace: app
data:
  NGROK_TARGET: "http://backend-api.app.svc.cluster.local:3000"
  NGROK_DOMAIN: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-ngrok
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api-ngrok
  template:
    metadata:
      labels:
        app: backend-api-ngrok
    spec:
      containers:
        - name: ngrok
          image: ngrok/ngrok:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -n "${NGROK_DOMAIN}" ]; then
                ngrok http --log=stdout --log-format=logfmt --domain="${NGROK_DOMAIN}" "${NGROK_TARGET}"
              else
                ngrok http --log=stdout --log-format=logfmt "${NGROK_TARGET}"
              fi
          env:
            - name: NGROK_AUTHTOKEN
              valueFrom:
                secretKeyRef:
                  name: ngrok-auth
                  key: NGROK_AUTHTOKEN
            - name: NGROK_TARGET
              valueFrom:
                configMapKeyRef:
                  name: backend-api-ngrok-env
                  key: NGROK_TARGET
            - name: NGROK_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: backend-api-ngrok-env
                  key: NGROK_DOMAIN
          ports:
            - containerPort: 4040
              name: inspector
          resources:
            requests:
              cpu: 50m
              memory: 64M
