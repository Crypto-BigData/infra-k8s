apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.62.0
          env:
            - name: REDIS_ADDR
              value: redis://redis.app.svc.cluster.local:6379
          ports:
            - name: metrics
              containerPort: 9121
          resources:
            requests:
              cpu: 50m
              memory: 80Mi
            limits:
              cpu: 200m
              memory: 200Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: monitor
spec:
  selector:
    app: redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics

