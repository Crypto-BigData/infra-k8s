apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:v1.7.0
          args:
            - --kafka.server=kk.kafka.svc.cluster.local:9092
          ports:
            - name: metrics
              containerPort: 9308
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              cpu: 300m
              memory: 250Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: monitor
spec:
  selector:
    app: kafka-exporter
  ports:
    - name: metrics
      port: 9308
      targetPort: metrics

