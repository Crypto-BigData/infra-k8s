apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
spec:
  serviceName: kk
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      tolerations:
        - key: "db"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1
          ports:
            - name: k8s
              containerPort: 9092
          env:
            - name: "KAFKA_BROKER_ID"
              value: "1"
            - name: "KAFKA_ZOOKEEPER_CONNECT"
              value: zk.kafka.svc.cluster.local:2181
            - name: "KAFKA_LISTENERS"
              value: PLAINTEXT://0.0.0.0:9092
            - name: "KAFKA_ADVERTISED_LISTENERS"
              value: PLAINTEXT://kk.kafka.svc.cluster.local:9092
            - name: "KAFKA_LISTENER_SECURITY_PROTOCOL_MAP"
              value: "PLAINTEXT:PLAINTEXT"
            - name: "KAFKA_INTER_BROKER_LISTENER_NAME"
              value: PLAINTEXT
            - name: "KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR"
              value: "1"
            - name: "KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR"
              value: "1"
            - name: "KAFKA_TRANSACTION_STATE_LOG_MIN_ISR"
              value: "1"
            - name: "KAFKA_AUTO_CREATE_TOPICS_ENABLE"
              value: "false"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka
          resources:
            limits:
              cpu: 500m
              memory: 1000M
            requests:
              cpu: 100m
              memory: 500M
      securityContext:
        fsGroup: 1000
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        storageClassName: standard-rwo
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kk
  namespace: kafka
spec:
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
  selector:
    app: kafka
